<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aidan Leonard</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #080c10;
    }

    /* Full-bleed background photo */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    /* Subtle gradient at the bottom so "contact" is always legible */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent       0%,
        transparent       65%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    /* Contact link */
    a.contact {
      position: fixed;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Arial', 'Helvetica', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      text-decoration: none;
      transition: color 0.4s ease;
      white-space: nowrap;
    }

    a.contact:hover {
      color: rgba(255, 255, 255, 1);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <a class="contact" href="mailto:connect@aidanleonard.com">contact</a>
</body>
</html>
